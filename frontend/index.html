<html>

<h1>Simple Shop</h1>

<div id="products"></div>

<h2>Cart</h2>

<div id="cart"></div>

<button onclick="order()">ORDER</button>

<script>

const API="https://your-api-url/api"

let cart=[]

async function load(){

 const res=await fetch(API+"/products")

 const products=await res.json()

 const div=document.getElementById("products")

 for(const id in products){

  const name=products[id]

  const btn=document.createElement("button")

  btn.innerText="add "+name

  btn.onclick=()=>{
   cart.push(name)
   renderCart()
  }

  div.appendChild(btn)

 }

}

function renderCart(){

 document.getElementById("cart").innerText=cart.join(",")

}

async function order(){

 await fetch(API+"/order",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({
   items:cart.join(",")
  })
 })

 alert("ordered")

 cart=[]

 renderCart()

}

load()

</script>

</html>
