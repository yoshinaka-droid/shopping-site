<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Shopping Site</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .lang-switcher { margin: 20px; }
    </style>
</head>

<body>

<div class="lang-switcher">
    <button onclick="switchLanguage('en')">English</button>
    <button onclick="switchLanguage('ja')">日本語</button>
</div>
<h1 id="title">Welcome to the Shopping Site</h1>
<p id="message">Browse our products and enjoy shopping!</p>

<div id="products"></div>
    
<h1>Shop</h1>
<h2>Cart</h2>
<div id="cart"></div>

<button onclick="order()">ORDER</button>

<h2>Order History</h2>
<div id="orders"></div>

<script>

const API="/api"
let cart=[]

function switchLanguage(lang) {
        const englishContent = {
            title: 'Welcome to the Shopping Site',
            message: 'Browse our products and enjoy shopping!'
        };
        const japaneseContent = {
            title: 'ショッピングサイトへようこそ',
            message: '商品をブラウズして、お買い物を楽しんでください！'
        };

        const content = lang === 'ja' ? japaneseContent : englishContent;
        document.getElementById('title').innerText = content.title;
        document.getElementById('message').innerText = content.message;
    }

async function load(){

 const res=await fetch(API+"/products")
 const products=await res.json()

 for(const id in products){

  const btn=document.createElement("button")

  btn.innerText="add "+products[id]

  btn.onclick=()=>{
   cart.push(products[id])
   render()
  }

  document.getElementById("products").appendChild(btn)
 }

}

function render(){
 document.getElementById("cart").innerText=cart.join(",")
}

async function order(){

 await fetch(API+"/order",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({items:cart.join(",")})
 })

 alert("ordered")

 cart=[]
 render()

 loadOrders()

}

async function loadOrders(){

 const res=await fetch(API+"/orders")
 const orders=await res.json()

 const div=document.getElementById("orders")

 div.innerHTML=""

 for(const id in orders){

  const o=orders[id]

  const p=document.createElement("p")

  p.innerText=id+" : "+o.items+" ("+o.time+")"

  div.appendChild(p)

 }

}

load()
loadOrders()

</script>

</body>

</html>
